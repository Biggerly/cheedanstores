<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Cheedan Stores</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.container{
  background:#fff;
  padding:32px;
  border-radius:24px;
  box-shadow:0 20px 40px -10px rgba(0,0,0,0.15);
  width:100%;
  max-width:420px;
  border:1px solid rgba(22,163,74,0.1);
}

.logo{
  text-align:center;
  margin-bottom:24px;
}

.logo i{
  font-size:48px;
  color:#16a34a;
  background:#dcfce7;
  padding:12px;
  border-radius:50%;
}

h2{
  color:#022c22;
  font-size:28px;
  font-weight:700;
  margin-bottom:8px;
  text-align:center;
}

.subtitle{
  color:#64748b;
  font-size:14px;
  text-align:center;
  margin-bottom:24px;
}

/* Input Groups */
.input-group{
  margin-bottom:16px;
  position:relative;
}

.input-group label{
  display:block;
  font-size:13px;
  color:#475569;
  margin-bottom:6px;
  font-weight:500;
}

.input-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.input-wrapper i{
  position:absolute;
  left:14px;
  color:#94a3b8;
  font-size:18px;
}

.input-wrapper input{
  width:100%;
  padding:14px 14px 14px 45px;
  border:2px solid #e5e7eb;
  border-radius:14px;
  font-size:15px;
  outline:none;
  transition:all 0.2s;
  background:#fff;
}

.input-wrapper input:focus{
  border-color:#16a34a;
  box-shadow:0 0 0 4px rgba(22,163,74,0.1);
}

.input-wrapper input.error{
  border-color:#dc2626;
}

.toggle-password{
  position:absolute;
  right:14px;
  color:#94a3b8;
  cursor:pointer;
  font-size:20px;
}

.toggle-password:hover{
  color:#16a34a;
}

/* Remember Me & Forgot Password */
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 0 20px;
}

.remember{
  display:flex;
  align-items:center;
  gap:6px;
}

.remember input[type="checkbox"]{
  width:16px;
  height:16px;
  cursor:pointer;
  accent-color:#16a34a;
}

.remember label{
  font-size:13px;
  color:#475569;
  cursor:pointer;
}

.forgot-link{
  font-size:13px;
  color:#16a34a;
  text-decoration:none;
  font-weight:500;
}

.forgot-link:hover{
  text-decoration:underline;
}

/* Button */
.login-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#16a34a;
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:16px;
}

.login-btn:hover:not(:disabled){
  background:#15803d;
  transform:translateY(-2px);
  box-shadow:0 8px 16px rgba(22,163,74,0.2);
}

.login-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.login-btn i{
  font-size:20px;
}

/* Error Message */
.error-message{
  background:#fee2e2;
  border:1px solid #fecaca;
  color:#dc2626;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.error-message i{
  font-size:18px;
}

/* Success Message */
.success-message{
  background:#dcfce7;
  border:1px solid #bbf7d0;
  color:#166534;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.success-message i{
  font-size:18px;
}

.hidden{
  display:none;
}

/* Loading Spinner */
.spinner{
  width:20px;
  height:20px;
  border:3px solid rgba(255,255,255,0.3);
  border-radius:50%;
  border-top-color:#fff;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* Footer */
.footer{
  text-align:center;
  margin-top:16px;
  font-size:14px;
  color:#64748b;
}

.footer a{
  color:#16a34a;
  text-decoration:none;
  font-weight:600;
}

.footer a:hover{
  text-decoration:underline;
}

/* Responsive */
@media(max-width:480px){
  .container{padding:24px;}
  h2{font-size:24px;}
  .actions{flex-direction:column;gap:12px;align-items:flex-start;}
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <i class='bx bx-log-in-circle'></i>
  </div>
  
  <h2>Welcome Back</h2>
  <p class="subtitle">Sign in to your Cheedan account</p>

  <!-- Error/Success Messages -->
  <div id="errorMessage" class="error-message hidden">
    <i class='bx bx-error-circle'></i>
    <span id="errorText"></span>
  </div>

  <div id="successMessage" class="success-message hidden">
    <i class='bx bx-check-circle'></i>
    <span>Login successful! Redirecting...</span>
  </div>

  <!-- Login Form -->
  <div class="input-group">
    <label>Email Address</label>
    <div class="input-wrapper">
      <i class='bx bx-envelope'></i>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
  </div>

  <div class="input-group">
    <label>Password</label>
    <div class="input-wrapper">
      <i class='bx bx-lock-alt'></i>
      <input type="password" id="password" placeholder="Enter your password">
      <i class='bx bx-show toggle-password' id="togglePassword"></i>
    </div>
  </div>

  <!-- Remember Me & Forgot Password -->
  <div class="actions">
    <div class="remember">
      <input type="checkbox" id="remember">
      <label for="remember">Remember me</label>
    </div>
    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
  </div>

  <!-- Login Button -->
  <button class="login-btn" id="loginBtn">
    <span>Sign In</span>
    <i class='bx bx-right-arrow-alt'></i>
  </button>

  <!-- Sign Up Link -->
  <div class="footer">
    Don't have an account? <a href="signup.html">Create Account</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword,
    setPersistence,
    browserLocalPersistence,
    browserSessionPersistence
  } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
    authDomain: "cheedan.firebaseapp.com",
    projectId: "cheedan",
    storageBucket: "cheedan.firebasestorage.app",
    messagingSenderId: "445764602981",
    appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c",
    measurementId: "G-R2NCH9TRTP"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // DOM Elements
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const rememberCheck = document.getElementById('remember');
  const togglePassword = document.getElementById('togglePassword');
  const errorMessage = document.getElementById('errorMessage');
  const errorText = document.getElementById('errorText');
  const successMessage = document.getElementById('successMessage');

  // Toggle password visibility
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.className = type === 'password' ? 'bx bx-show toggle-password' : 'bx bx-hide toggle-password';
  });

  // Show error function
  function showError(message) {
    errorText.textContent = message;
    errorMessage.classList.remove('hidden');
    successMessage.classList.add('hidden');
    
    // Auto hide after 5 seconds
    setTimeout(() => {
      errorMessage.classList.add('hidden');
    }, 5000);
  }

  // Show success function
  function showSuccess() {
    successMessage.classList.remove('hidden');
    errorMessage.classList.add('hidden');
  }

  // Validate form
  function validateForm() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showError('Please fill in all fields');
      return false;
    }

    if (!/\S+@\S+\.\S+/.test(email)) {
      showError('Please enter a valid email address');
      return false;
    }

    return true;
  }

  // Login handler
  loginBtn.addEventListener('click', async () => {
    if (!validateForm()) return;

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Set persistence based on "Remember me" checkbox
    try {
      if (rememberCheck.checked) {
        await setPersistence(auth, browserLocalPersistence);
      } else {
        await setPersistence(auth, browserSessionPersistence);
      }
    } catch (err) {
      console.error('Persistence error:', err);
    }

    // Disable button and show loading
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      
      showSuccess();
      
      // Check if email is verified
      if (!userCredential.user.emailVerified) {
        // Optional: Show warning but still login
        console.log('Email not verified');
      }
      
      // Redirect after 1.5 seconds
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    } catch (err) {
      console.error('Login error:', err);
      
      // Handle specific error messages
      let message = 'Invalid email or password';
      if (err.code === 'auth/user-not-found') {
        message = 'No account found with this email';
      } else if (err.code === 'auth/wrong-password') {
        message = 'Incorrect password';
      } else if (err.code === 'auth/too-many-requests') {
        message = 'Too many failed attempts. Try again later';
      } else if (err.code === 'auth/user-disabled') {
        message = 'This account has been disabled';
      }
      
      showError(message);
      
      // Re-enable button
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span>Sign In</span><i class="bx bx-right-arrow-alt"></i>';
    }
  });

  // Enter key support
  passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  emailInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') passwordInput.focus();
  });

  // Check for redirect from signup
  window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('verified') === 'false') {
      // Show message about email verification
      const infoMsg = document.createElement('div');
      infoMsg.className = 'success-message';
      infoMsg.innerHTML = '<i class="bx bx-envelope"></i><span>Please verify your email before logging in</span>';
      
      // Insert at the top of the container
      const container = document.querySelector('.container');
      container.insertBefore(infoMsg, container.firstChild);
      
      setTimeout(() => infoMsg.remove(), 5000);
    }
  });
</script>

</body>
</html>

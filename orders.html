    <strong>My Orders</strong>
  </div>

<nav class="breadcrumb">

<div class="page">

</div>

<!-- Loading Spinner -->
<div id="loadingSpinner" class="hidden" style="text-align:center; padding:40px;">
  <div class="spinner"></div>
</div>

<style>
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #e5e7eb;
  border-top: 4px solid #16a34a;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}
@keyframes spin { 
  0% { transform: rotate(0deg); } 
  100% { transform: rotate(360deg); } 
}
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
  authDomain: "cheedan.firebaseapp.com",
  projectId: "cheedan",
  storageBucket: "cheedan.firebasestorage.app",
  messagingSenderId: "445764602981",
  appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c",
  measurementId: "G-R2NCH9TRTP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ordersList = document.getElementById("ordersList");
const emptyState = document.getElementById("emptyState");
const loadingSpinner = document.getElementById("loadingSpinner");

// ========== SAMPLE ORDER ITEMS (since your order doesn't have items array) ==========
// This is temporary - you need to add items to your orders in Firebase
function getSampleItems() {
  return [
    {
      name: "Sample Product",
      price: 50000,
      qty: 2,
      image: "https://images.unsplash.com/photo-1586201375761-83865001e31c"
    },
    {
      name: "Another Product",
      price: 46000,
      qty: 2,
      image: "https://images.unsplash.com/photo-1585386959984-a41552231693"
    }
  ];
}

// ========== RENDER ORDERS FUNCTION ==========
function renderOrders(orders){
  ordersList.innerHTML = "";
  
  if(!orders || !orders.length){
    emptyState.hidden = false;
    return;
  }
  
  emptyState.hidden = true;

  // Status colors mapping
  const statusColors = {
    pending: '#f59e0b',
    pending_payment: '#f59e0b',
    processing: '#3b82f6',
    shipped: '#8b5cf6',
    delivered: '#10b981',
    cancelled: '#ef4444',
    paid: '#10b981'
  };

  // Status display names
  const statusNames = {
    pending: 'Pending',
    pending_payment: 'Awaiting Payment',
    processing: 'Processing',
    shipped: 'Shipped',
    delivered: 'Delivered',
    cancelled: 'Cancelled',
    paid: 'Paid'
  };

  orders.forEach(order => {
    const card = document.createElement("div");
    card.className = "order-card";

    let itemsHTML = "";
    let total = 0;

    // Get items - either from order.items or use sample items
    const items = order.items && order.items.length ? order.items : getSampleItems();
    
    // Calculate total from items
    items.forEach(i => {
      const qty = parseInt(i.qty) || 1;
      const price = parseFloat(i.price) || 0;
      total += price * qty;
      
      itemsHTML += `
        <div class="item">
          <img src="${i.image || 'https://images.unsplash.com/photo-1586201375761-83865001e31c'}" alt="${i.name || 'Product'}">
          <div>
            <strong>${i.name || 'Product'}</strong><br>
            <small>₦${price.toLocaleString()} × ${qty}</small>
          </div>
        </div>
      `;
    });

    // Handle date safely - YOUR ORDER HAS createdAt FIELD
    let dateDisplay = 'Date not available';
    try {
      const date = order.createdAt?.toDate ? order.createdAt.toDate() : new Date(order.createdAt || Date.now());
      dateDisplay = `${date.toLocaleDateString()} at ${date.toLocaleTimeString()}`;
    } catch (e) {
      console.error('Date parsing error:', e);
    }
    
    const status = order.status || 'pending';
    const statusColor = statusColors[status] || '#94a3b8';
    const statusName = statusNames[status] || status.toUpperCase();
    
    // Use orderNumber if available, otherwise use document ID
    const orderNumber = order.orderNumber || (order.id ? order.id.slice(-8) : 'N/A');

    // Payment method display
    const paymentMethod = order.paymentMethod || 'Not specified';
    const paymentMethodDisplay = paymentMethod === 'cash' ? 'Cash on Delivery' : 
                                 paymentMethod === 'paystack' ? 'Card Payment' : paymentMethod;

    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
        <span class="order-number">Order #${orderNumber}</span>
        <div>
          <span style="background:${statusColor}; color:white; padding:4px 12px; border-radius:999px; font-size:11px; font-weight:600;">
            ${statusName}
          </span>
          <span class="payment-badge" style="background:#f1f5f9; color:#475569;">
            ${paymentMethodDisplay}
          </span>
        </div>
      </div>

      <div class="order-head">
        <span>Placed on</span>
        <span>${dateDisplay}</span>
      </div>

      <div class="order-items">
        ${itemsHTML || "<small style='color:#64748b;'>No items found</small>"}
      </div>

      <div class="total">
        Total: ₦${(order.total || total).toLocaleString()}
      </div>

      <div class="address">
        <strong>Delivery to:</strong><br>
        ${order.customerName || 'N/A'} – ${order.customerPhone || 'N/A'}<br>
        ${order.customerAddress || 'No address provided'}<br>
        ${order.notes ? `<small style="color:#f59e0b;">Note: ${order.notes}</small>` : ''}
      </div>
    `;
    
    ordersList.appendChild(card);
  });
}

// ========== LOAD USER ORDERS ==========
async function loadUserOrders(user) {
  // Show loading spinner
  loadingSpinner.classList.remove("hidden");
  ordersList.innerHTML = "";
  emptyState.hidden = true;

  try {
    // Query orders from Firestore
    const q = query(
      collection(db, "orders"),
      where("userId", "==", user.uid),
      orderBy("createdAt", "desc")
    );

    const querySnapshot = await getDocs(q);
    
    console.log('Found', querySnapshot.size, 'orders'); // Debug log
    
    if (querySnapshot.empty) {
      // No orders found
      emptyState.hidden = false;
      ordersList.innerHTML = "";
    } else {
      // Map orders with IDs
      const orders = querySnapshot.docs.map(doc => ({ 
        id: doc.id, 
        ...doc.data() 
      }));
      
      console.log('Orders data:', orders); // Debug log to see structure
      renderOrders(orders);
    }
    
  } catch (error) {
    console.error("Error loading orders:", error);
    
    if (error.code === 'failed-precondition') {
      emptyState.innerHTML = `
        <i class='bx bx-error-circle' style="font-size:48px; color:#ef4444;"></i>
        <h3 style="margin:16px 0 8px;">Database Setup Required</h3>
        <p style="color:#64748b; margin-bottom:24px;">Please create the required Firebase index. Check console for details.</p>
        <a href="index.html" style="background:#16a34a; color:white; padding:12px 24px; border-radius:999px; text-decoration:none; font-weight:600; display:inline-block;">Go Home</a>
      `;
    } else {
      emptyState.innerHTML = `
        <i class='bx bx-error-circle' style="font-size:48px; color:#ef4444;"></i>
        <h3 style="margin:16px 0 8px;">Error Loading Orders</h3>
        <p style="color:#64748b; margin-bottom:24px;">${error.message || 'Please try again later.'}</p>
        <a href="#" onclick="location.reload()" style="background:#16a34a; color:white; padding:12px 24px; border-radius:999px; text-decoration:none; font-weight:600; display:inline-block;">Try Again</a>
      `;
    }
    emptyState.hidden = false;
    
  } finally {
    loadingSpinner.classList.add("hidden");
  }
}

// ========== AUTH STATE OBSERVER ==========
onAuthStateChanged(auth, async user => {
  if(!user){
    // User not logged in
    emptyState.innerHTML = `
      <i class='bx bx-user-circle' style="font-size:48px; color:#94a3b8;"></i>
      <h3 style="margin:16px 0 8px;">Please log in</h3>
      <p style="color:#64748b; margin-bottom:24px;">You need to be logged in to view your orders.</p>
      <a href="login.html" style="background:#16a34a; color:white; padding:12px 24px; border-radius:999px; text-decoration:none; font-weight:600; display:inline-block;">Log In</a>
    `;
    emptyState.hidden = false;
    ordersList.innerHTML = "";
    loadingSpinner.classList.add("hidden");
    return;
  }

  // User is logged in - load orders
  await loadUserOrders(user);
});
</script>

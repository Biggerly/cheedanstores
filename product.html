<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product – Cheedan Stores</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:#f8fafc;
  padding:16px;
}

.page{
  max-width:900px;
  margin:auto;
}

.breadcrumb{
  font-size:13px;
  margin-bottom:12px;
  color:#64748b;
}

.breadcrumb a{
  color:#16a34a;
  text-decoration:none;
}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:16px;
  display:grid;
  gap:16px;
}

@media(min-width:800px){
  .card{
    grid-template-columns:1fr 1fr;
    align-items:start;
  }
}

.img-wrap img{
  width:100%;
  height:320px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

h1{
  font-size:20px;
  margin-bottom:8px;
  color:#022c22;
}

.price{
  font-size:18px;
  font-weight:700;
  color:#16a34a;
  margin-bottom:12px;
}

.meta{
  font-size:13px;
  color:#64748b;
  margin-bottom:16px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.actions button{
  border:none;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

.add-btn{
  background:#16a34a;
  color:#fff;
}

.back-btn{
  background:#f1f5f9;
  color:#0f172a;
}

/* skeleton */

.skeleton{
  background:#e5e7eb;
  border-radius:12px;
  position:relative;
  overflow:hidden;
}

.skeleton::after{
  content:"";
  position:absolute;
  inset:0;
  transform:translateX(-100%);
  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  100%{transform:translateX(100%)}
}

.sk-img{height:320px;}
.sk-line{height:14px;margin-bottom:10px;border-radius:8px;}
.sk-line.w60{width:60%}

/* empty */

.empty{
  text-align:center;
  padding:50px 12px;
  color:#64748b;
}

.empty a{
  display:inline-block;
  margin-top:12px;
  text-decoration:none;
  color:#16a34a;
  font-weight:600;
}
</style>
</head>
<body>

<div class="page">

  <div class="breadcrumb">
    <a href="index.html">Home</a>
    ›
    <span id="bcCat">Product</span>
  </div>

  <!-- skeleton -->
  <div id="loader" class="card">
    <div class="skeleton sk-img"></div>
    <div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line w60"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line w60"></div>
    </div>
  </div>

  <!-- product -->
  <div id="productCard" class="card" hidden>
    <div class="img-wrap">
      <img id="pImage" alt="">
    </div>

    <div>
      <h1 id="pTitle"></h1>
      <div class="price" id="pPrice"></div>
      <div class="meta" id="pCategory"></div>

      <div class="actions">
        <button
  class="add-btn"
  aria-label="Add product to cart"
  data-id="PRODUCT_ID"
  data-name="PRODUCT_NAME"
  data-price="PRODUCT_PRICE"
  data-image="PRODUCT_IMAGE_URL"
>
  Add to cart
</button>
        <button class="back-btn" id="goBack">Back</button>
      </div>
    </div>
  </div>

  <!-- empty -->
  <div id="emptyState" class="empty" hidden>
    <strong>Product not found</strong>
    <div>This product may have been removed.</div>
    <a href="index.html">Go back to shop</a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
  authDomain: "cheedan.firebaseapp.com",
  projectId: "cheedan",
  storageBucket: "cheedan.firebasestorage.app",
  messagingSenderId: "445764602981",
  appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params = new URLSearchParams(location.search);
const id = params.get("id");

const loader = document.getElementById("loader");
const card   = document.getElementById("productCard");
const empty  = document.getElementById("emptyState");

const pTitle = document.getElementById("pTitle");
const pPrice = document.getElementById("pPrice");
const pImage = document.getElementById("pImage");
const pCat   = document.getElementById("pCategory");
const bcCat  = document.getElementById("bcCat");

document.getElementById("goBack").onclick = () => history.back();

if(!id){
  loader.style.display="none";
  empty.hidden=false;
}else{
  loadProduct(id);
}

async function loadProduct(pid){

  try{

    const ref  = doc(db,"products",pid);
    const snap = await getDoc(ref);

    loader.style.display="none";

    if(!snap.exists()){
      empty.hidden=false;
      return;
    }

    const p = snap.data();

    pTitle.textContent = p.title || p.name || "Untitled";
    pPrice.textContent = "₦" + Number(p.price).toLocaleString();
    pImage.src = p.image;
    pImage.alt = p.title || "";

    pCat.textContent = "Category: " + (p.category || "—");
    bcCat.textContent = p.category || "Product";

    card.hidden=false;

  }catch(err){
    console.error(err);
    loader.style.display="none";
    empty.hidden=false;
  }

}


const addBtn = document.querySelector(".add-btn");

addBtn.addEventListener("click", () => {

  const item = {
    id: addBtn.dataset.id,
    name: addBtn.dataset.name,
    price: Number(addBtn.dataset.price),
    image: addBtn.dataset.image,
    qty: 1
  };

  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const existing = cart.find(p => p.id === item.id);

  if(existing){
    existing.qty += 1;
  }else{
    cart.push(item);
  }

  localStorage.setItem("cart", JSON.stringify(cart));

});
</script>

</body>
</html>

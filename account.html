<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account – Cheedan Stores</title>

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:#f8fafc;
  padding-bottom:72px;
}

.header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

.header-inner{
  max-width:900px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.header-inner a{
  text-decoration:none;
  color:#16a34a;
  font-weight:600;
  display:flex;
  align-items:center;
}

.breadcrumb{
  max-width:900px;
  margin:10px auto 0;
  padding:0 16px;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:6px;
  color:#64748b;
}

.breadcrumb a{
  text-decoration:none;
  color:#16a34a;
  font-weight:500;
}

.breadcrumb i{
  font-size:14px;
  color:#94a3b8;
}

.breadcrumb span{
  color:#0f172a;
  font-weight:600;
}

/* Account card */
.main{
  max-width:720px;
  margin:auto;
  padding:18px 14px;
}

.account-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:18px;
}

.user-box{
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:18px;
}

.user-avatar{
  width:54px;
  height:54px;
  border-radius:50%;
  background:#dcfce7;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#16a34a;
}

.user-name{
  font-weight:700;
  color:#022c22;
}

.user-email{
  font-size:13px;
  color:#64748b;
}

.menu-list{
  margin-top:10px;
  display:grid;
  gap:10px;
}

.menu-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 14px;
  border-radius:12px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  cursor:pointer;
  font-size:14px;
  color:#0f172a;
  transition:all 0.2s;
}

.menu-item:hover{
  border-color:#16a34a;
  background:#fff;
}

.menu-item i{
  font-size:20px;
  color:#16a34a;
}

.menu-item.danger i{
  color:#dc2626;
}

.menu-item.danger:hover{
  border-color:#dc2626;
}

.auth-box{
  display:grid;
  gap:12px;
}

.auth-box button{
  padding:12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:all 0.2s;
}

.login-btn{
  background:#16a34a;
  color:#fff;
}

.login-btn:hover{
  background:#15803d;
  transform:translateY(-2px);
}

.signup-btn{
  background:#e5e7eb;
}

.signup-btn:hover{
  background:#d1d5db;
  transform:translateY(-2px);
}

.hidden{display:none;}

/* Custom Alert Modal */
.custom-alert {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.custom-alert.show {
  opacity: 1;
  visibility: visible;
}

.alert-box {
  background: #fff;
  border-radius: 24px;
  padding: 32px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
  transform: scale(0.9);
  transition: transform 0.3s ease;
  border: 1px solid rgba(22, 163, 74, 0.2);
}

.custom-alert.show .alert-box {
  transform: scale(1);
}

.alert-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #f0fdf4;
}

.alert-icon i {
  font-size: 48px;
  color: #16a34a;
}

.alert-icon.warning {
  background: #fef3c7;
}

.alert-icon.warning i {
  color: #f59e0b;
}

.alert-icon.error {
  background: #fee2e2;
}

.alert-icon.error i {
  color: #dc2626;
}

.alert-icon.info {
  background: #dbeafe;
}

.alert-icon.info i {
  color: #3b82f6;
}

.alert-title {
  font-size: 22px;
  font-weight: 700;
  color: #022c22;
  margin-bottom: 8px;
}

.alert-message {
  font-size: 15px;
  color: #475569;
  margin-bottom: 24px;
  line-height: 1.5;
}

.alert-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.alert-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 999px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex: 1;
}

.alert-btn-primary {
  background: #16a34a;
  color: #fff;
}

.alert-btn-primary:hover {
  background: #15803d;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
}

.alert-btn-secondary {
  background: #f1f5f9;
  color: #475569;
}

.alert-btn-secondary:hover {
  background: #e2e8f0;
  transform: translateY(-2px);
}

.alert-btn-danger {
  background: #dc2626;
  color: #fff;
}

.alert-btn-danger:hover {
  background: #b91c1c;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
}

/* Loading Spinner */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #e5e7eb;
  border-top: 4px solid #16a34a;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}
@keyframes spin { 
  0% { transform: rotate(0deg); } 
  100% { transform: rotate(360deg); } 
}

body{
  background:
    linear-gradient(0deg, rgba(0,0,0,0.015), rgba(0,0,0,0.015)),
    #faf9f6;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html"><i class='bx bx-arrow-back'></i></a>
    <strong>My Account</strong>
  </div>
</header>

<nav class="breadcrumb">
  <a href="index.html">Home</a>
  <i class='bx bx-chevron-right'></i>
  <span>Account</span>
</nav>

<main class="main">

  <!-- Account card -->
  <div class="account-card">

    <!-- when signed in -->
    <div id="signedInBox" class="hidden">

      <div class="user-box">
        <div class="user-avatar">
          <i class='bx bx-user'></i>
        </div>
        <div>
          <div id="userName" class="user-name"></div>
          <div id="userEmail" class="user-email"></div>
        </div>
      </div>

      <div class="menu-list">

        <a href="orders.html" style="text-decoration:none; color:inherit;">
          <div class="menu-item" tabindex="0" aria-label="My orders">
            <span><i class='bx bx-receipt'></i> My Orders</span>
            <i class='bx bx-chevron-right'></i>
          </div>
        </a>

        <div class="menu-item" id="goProfile" tabindex="0" aria-label="Profile">
          <span><i class='bx bx-id-card'></i> Profile</span>
          <i class='bx bx-chevron-right'></i>
        </div>

        <div class="menu-item" id="goSupport" tabindex="0" aria-label="Customer support">
          <span><i class='bx bx-support'></i> Customer support</span>
          <i class='bx bx-chevron-right'></i>
        </div>

        <div class="menu-item danger" id="logoutBtn" tabindex="0" aria-label="Logout">
          <span><i class='bx bx-log-out'></i> Logout</span>
          <i class='bx bx-chevron-right'></i>
        </div>

      </div>

    </div>

    <!-- when NOT signed in -->
    <div id="signedOutBox" class="auth-box hidden">
      <p style="font-size:14px;color:#475569">
        Sign in to view your orders and manage your account.
      </p>
      <button class="login-btn" id="loginBtn" aria-label="Login">Log in</button>
      <button class="signup-btn" id="signupBtn" aria-label="Sign up">Create account</button>
    </div>

  </div>

</main>

<!-- Loading Spinner -->
<div id="loadingSpinner" class="hidden" style="text-align:center; padding:40px;">
  <div class="spinner"></div>
</div>

<!-- Custom Alert Modal -->
<div id="customAlert" class="custom-alert">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">
      <i class='bx bx-log-out'></i>
    </div>
    <h3 class="alert-title" id="alertTitle">Logout</h3>
    <p class="alert-message" id="alertMessage">Are you sure you want to log out?</p>
    <div class="alert-buttons" id="alertButtons">
      <button class="alert-btn alert-btn-secondary" id="alertCancelBtn">Cancel</button>
      <button class="alert-btn alert-btn-danger" id="alertConfirmBtn">Logout</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
  authDomain: "cheedan.firebaseapp.com",
  projectId: "cheedan",
  storageBucket: "cheedan.firebasestorage.app",
  messagingSenderId: "445764602981",
  appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c",
  measurementId: "G-R2NCH9TRTP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const signedInBox = document.getElementById("signedInBox");
const signedOutBox = document.getElementById("signedOutBox");
const userName = document.getElementById("userName");
const userEmail = document.getElementById("userEmail");
const loadingSpinner = document.getElementById("loadingSpinner");

// Custom Alert elements
const customAlert = document.getElementById("customAlert");
const alertIcon = document.getElementById("alertIcon");
const alertTitle = document.getElementById("alertTitle");
const alertMessage = document.getElementById("alertMessage");
const alertButtons = document.getElementById("alertButtons");
const alertCancelBtn = document.getElementById("alertCancelBtn");
const alertConfirmBtn = document.getElementById("alertConfirmBtn");

// ===== CUSTOM ALERT FUNCTIONS =====
function showAlert({
  title = "Notification",
  message = "",
  icon = "info-circle",
  iconType = "info",
  showCancel = true,
  confirmText = "OK",
  cancelText = "Cancel",
  onConfirm = null,
  onCancel = null
}) {
  // Set icon
  alertIcon.innerHTML = `<i class='bx bx-${icon}'></i>`;
  alertIcon.className = 'alert-icon';
  
  if (iconType === 'warning') {
    alertIcon.classList.add('warning');
  } else if (iconType === 'error') {
    alertIcon.classList.add('error');
  } else if (iconType === 'info') {
    alertIcon.classList.add('info');
  }

  // Set content
  alertTitle.textContent = title;
  alertMessage.textContent = message;

  // Set buttons
  if (showCancel) {
    alertButtons.innerHTML = `
      <button class="alert-btn alert-btn-secondary" id="alertCancelBtn">${cancelText}</button>
      <button class="alert-btn ${iconType === 'danger' ? 'alert-btn-danger' : 'alert-btn-primary'}" id="alertConfirmBtn">${confirmText}</button>
    `;
  } else {
    alertButtons.innerHTML = `
      <button class="alert-btn alert-btn-primary" id="alertConfirmBtn" style="flex:1;">${confirmText}</button>
    `;
  }

  // Add event listeners
  const newCancelBtn = document.getElementById("alertCancelBtn");
  const newConfirmBtn = document.getElementById("alertConfirmBtn");

  if (newCancelBtn) {
    newCancelBtn.addEventListener('click', () => {
      hideAlert();
      if (onCancel) onCancel();
    });
  }

  newConfirmBtn.addEventListener('click', () => {
    hideAlert();
    if (onConfirm) onConfirm();
  });

  // Show modal
  customAlert.classList.add('show');
}

function hideAlert() {
  customAlert.classList.remove('show');
}

// ===== AUTH STATE =====
onAuthStateChanged(auth, async user => {
  loadingSpinner.classList.add("hidden");
  
  if (user) {
    signedOutBox.classList.add("hidden");
    signedInBox.classList.remove("hidden");

    userName.textContent = user.displayName || "Cheedan customer";
    userEmail.textContent = user.email || "";
  } else {
    signedInBox.classList.add("hidden");
    signedOutBox.classList.remove("hidden");
  }
});

// ===== BUTTON HANDLERS =====
document.getElementById("loginBtn")?.addEventListener("click", () => {
  window.location.href = "login.html";
});

document.getElementById("signupBtn")?.addEventListener("click", () => {
  window.location.href = "signup.html";
});

document.getElementById("goProfile")?.addEventListener("click", () => {
  showAlert({
    title: "Coming Soon",
    message: "Profile page is under construction. Check back soon!",
    icon: "time",
    iconType: "info",
    showCancel: false,
    confirmText: "Got it"
  });
});

document.getElementById("goSupport")?.addEventListener("click", () => {
  window.location.href = "support.html";
});

// ===== LOGOUT WITH CUSTOM ALERT =====
document.getElementById("logoutBtn")?.addEventListener("click", async (e) => {
  e.preventDefault();
  
  showAlert({
    title: "Logout",
    message: "Are you sure you want to log out?",
    icon: "log-out",
    iconType: "warning",
    showCancel: true,
    confirmText: "Logout",
    cancelText: "Cancel",
    onConfirm: async () => {
      // Show loading spinner
      loadingSpinner.classList.remove("hidden");
      
      try {
        await signOut(auth);
        
        showAlert({
          title: "Logged Out",
          message: "You have been successfully logged out.",
          icon: "check-circle",
          iconType: "success",
          showCancel: false,
          confirmText: "OK",
          onConfirm: () => {
            window.location.href = "index.html";
          }
        });
      } catch (error) {
        loadingSpinner.classList.add("hidden");
        showAlert({
          title: "Error",
          message: "Failed to log out. Please try again.",
          icon: "error-circle",
          iconType: "error",
          showCancel: false,
          confirmText: "OK"
        });
      }
    }
  });
});

// Click outside to close (optional - only for non-confirmation alerts)
customAlert.addEventListener('click', (e) => {
  if (e.target === customAlert) {
    // Only close if it's an info alert without confirmation
    if (!alertButtons.innerHTML.includes('alert-btn-danger')) {
      hideAlert();
    }
  }
});
</script>

</body>
</html>

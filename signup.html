<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Cheedan Stores</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.container{
  background:#fff;
  padding:32px;
  border-radius:24px;
  box-shadow:0 20px 40px -10px rgba(0,0,0,0.15);
  width:100%;
  max-width:420px;
  border:1px solid rgba(22,163,74,0.1);
}

.logo{
  text-align:center;
  margin-bottom:24px;
}

.logo i{
  font-size:48px;
  color:#16a34a;
  background:#dcfce7;
  padding:12px;
  border-radius:50%;
}

h2{
  color:#022c22;
  font-size:28px;
  font-weight:700;
  margin-bottom:8px;
  text-align:center;
}

.subtitle{
  color:#64748b;
  font-size:14px;
  text-align:center;
  margin-bottom:24px;
}

/* Input Groups */
.input-group{
  margin-bottom:16px;
  position:relative;
}

.input-group label{
  display:block;
  font-size:13px;
  color:#475569;
  margin-bottom:6px;
  font-weight:500;
}

.input-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.input-wrapper i{
  position:absolute;
  left:14px;
  color:#94a3b8;
  font-size:18px;
}

.input-wrapper input{
  width:100%;
  padding:14px 14px 14px 45px;
  border:2px solid #e5e7eb;
  border-radius:14px;
  font-size:15px;
  outline:none;
  transition:all 0.2s;
  background:#fff;
}

.input-wrapper input:focus{
  border-color:#16a34a;
  box-shadow:0 0 0 4px rgba(22,163,74,0.1);
}

.input-wrapper input.error{
  border-color:#dc2626;
}

.toggle-password{
  position:absolute;
  right:14px;
  color:#94a3b8;
  cursor:pointer;
  font-size:20px;
}

.toggle-password:hover{
  color:#16a34a;
}

/* Password Strength */
.password-strength{
  margin-top:8px;
  height:4px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

.strength-bar{
  height:100%;
  width:0%;
  transition:all 0.3s;
}

.strength-bar.weak{width:25%;background:#dc2626}
.strength-bar.medium{width:50%;background:#f59e0b}
.strength-bar.strong{width:75%;background:#16a34a}
.strength-bar.very-strong{width:100%;background:#059669}

.strength-text{
  font-size:12px;
  margin-top:4px;
  color:#64748b;
}

/* Requirements */
.requirements{
  background:#f8fafc;
  padding:16px;
  border-radius:14px;
  margin:16px 0;
}

.requirements p{
  font-size:13px;
  color:#475569;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:6px;
}

.requirement{
  font-size:12px;
  color:#64748b;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
}

.requirement i{
  font-size:14px;
  width:18px;
}

.requirement.valid{
  color:#16a34a;
}

.requirement.valid i{
  color:#16a34a;
}

/* Terms */
.terms{
  margin:20px 0;
  display:flex;
  align-items:center;
  gap:8px;
}

.terms input[type="checkbox"]{
  width:18px;
  height:18px;
  cursor:pointer;
  accent-color:#16a34a;
}

.terms label{
  font-size:13px;
  color:#475569;
  cursor:pointer;
}

.terms a{
  color:#16a34a;
  text-decoration:none;
  font-weight:600;
}

.terms a:hover{
  text-decoration:underline;
}

/* Button */
.signup-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#16a34a;
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.signup-btn:hover:not(:disabled){
  background:#15803d;
  transform:translateY(-2px);
  box-shadow:0 8px 16px rgba(22,163,74,0.2);
}

.signup-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.signup-btn i{
  font-size:20px;
}

/* Footer */
.footer{
  text-align:center;
  margin-top:20px;
  font-size:14px;
  color:#64748b;
}

.footer a{
  color:#16a34a;
  text-decoration:none;
  font-weight:600;
}

.footer a:hover{
  text-decoration:underline;
}

/* Error Message */
.error-message{
  background:#fee2e2;
  border:1px solid #fecaca;
  color:#dc2626;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.error-message i{
  font-size:18px;
}

/* Success Message */
.success-message{
  background:#dcfce7;
  border:1px solid #bbf7d0;
  color:#166534;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.success-message i{
  font-size:18px;
}

.hidden{
  display:none;
}

/* Loading Spinner */
.spinner{
  width:20px;
  height:20px;
  border:3px solid rgba(255,255,255,0.3);
  border-radius:50%;
  border-top-color:#fff;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* Responsive */
@media(max-width:480px){
  .container{padding:24px;}
  h2{font-size:24px;}
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <i class='bx bx-user-circle'></i>
  </div>
  
  <h2>Create Account</h2>
  <p class="subtitle">Join Cheedan Stores today</p>

  <!-- Error/Success Messages -->
  <div id="errorMessage" class="error-message hidden">
    <i class='bx bx-error-circle'></i>
    <span id="errorText"></span>
  </div>

  <div id="successMessage" class="success-message hidden">
    <i class='bx bx-check-circle'></i>
    <span>Account created! Redirecting...</span>
  </div>

  <!-- Signup Form -->
  <div class="input-group">
    <label>Email Address</label>
    <div class="input-wrapper">
      <i class='bx bx-envelope'></i>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="off">
    </div>
  </div>

  <div class="input-group">
    <label>Password</label>
    <div class="input-wrapper">
      <i class='bx bx-lock-alt'></i>
      <input type="password" id="password" placeholder="Create a strong password">
      <i class='bx bx-show toggle-password' id="togglePassword"></i>
    </div>
    
    <!-- Password Strength Meter -->
    <div class="password-strength">
      <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="strength-text" id="strengthText">Enter password</div>
  </div>

  <!-- Password Requirements -->
  <!-- <div class="requirements">
    <p><i class='bx bx-shield-quarter'></i> Password must have:</p>
    <div class="requirement" id="reqLength">
      <i class='bx bx-x-circle'></i> At least 8 characters
    </div>
    <div class="requirement" id="reqNumber">
      <i class='bx bx-x-circle'></i> At least 1 number
    </div>
    <div class="requirement" id="reqLower">
      <i class='bx bx-x-circle'></i> At least 1 lowercase letter
    </div>
    <div class="requirement" id="reqUpper">
      <i class='bx bx-x-circle'></i> At least 1 uppercase letter
    </div>
    <div class="requirement" id="reqSpecial">
      <i class='bx bx-x-circle'></i> At least 1 special character (!@#$%^&*)
    </div>
  </div> -->

  <!-- Terms Checkbox -->
  <div class="terms">
    <input type="checkbox" id="terms">
    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
  </div>

  <!-- Sign Up Button -->
  <button class="signup-btn" id="signupBtn">
    <span>Create Account</span>
    <i class='bx bx-right-arrow-alt'></i>
  </button>

  <!-- Login Link -->
  <div class="footer">
    Already have an account? <a href="login.html">Sign In</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
    authDomain: "cheedan.firebaseapp.com",
    projectId: "cheedan",
    storageBucket: "cheedan.firebasestorage.app",
    messagingSenderId: "445764602981",
    appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c",
    measurementId: "G-R2NCH9TRTP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // DOM Elements
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const signupBtn = document.getElementById('signupBtn');
  const termsCheck = document.getElementById('terms');
  const togglePassword = document.getElementById('togglePassword');
  const errorMessage = document.getElementById('errorMessage');
  const errorText = document.getElementById('errorText');
  const successMessage = document.getElementById('successMessage');
  
  // Password strength elements
  const strengthBar = document.getElementById('strengthBar');
  const strengthText = document.getElementById('strengthText');
  const reqLength = document.getElementById('reqLength');
  const reqNumber = document.getElementById('reqNumber');
  const reqLower = document.getElementById('reqLower');
  const reqUpper = document.getElementById('reqUpper');
  const reqSpecial = document.getElementById('reqSpecial');

  // Toggle password visibility
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.className = type === 'password' ? 'bx bx-show toggle-password' : 'bx bx-hide toggle-password';
  });

  // Password strength checker
  function checkPasswordStrength(password) {
    const hasLength = password.length >= 8;
    const hasNumber = /[0-9]/.test(password);
    const hasLower = /[a-z]/.test(password);
    const hasUpper = /[A-Z]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

    // Update requirement icons
    reqLength.innerHTML = `<i class='bx ${hasLength ? 'bx-check-circle' : 'bx-x-circle'}'></i> At least 8 characters`;
    reqNumber.innerHTML = `<i class='bx ${hasNumber ? 'bx-check-circle' : 'bx-x-circle'}'></i> At least 1 number`;
    reqLower.innerHTML = `<i class='bx ${hasLower ? 'bx-check-circle' : 'bx-x-circle'}'></i> At least 1 lowercase letter`;
    reqUpper.innerHTML = `<i class='bx ${hasUpper ? 'bx-check-circle' : 'bx-x-circle'}'></i> At least 1 uppercase letter`;
    reqSpecial.innerHTML = `<i class='bx ${hasSpecial ? 'bx-check-circle' : 'bx-x-circle'}'></i> At least 1 special character`;

    reqLength.classList.toggle('valid', hasLength);
    reqNumber.classList.toggle('valid', hasNumber);
    reqLower.classList.toggle('valid', hasLower);
    reqUpper.classList.toggle('valid', hasUpper);
    reqSpecial.classList.toggle('valid', hasSpecial);

    // Calculate strength
    const strength = [hasLength, hasNumber, hasLower, hasUpper, hasSpecial].filter(Boolean).length;
    
    strengthBar.className = 'strength-bar';
    if (password.length === 0) {
      strengthBar.style.width = '0%';
      strengthText.textContent = 'Enter password';
    } else if (strength <= 2) {
      strengthBar.classList.add('weak');
      strengthText.textContent = 'Weak password';
    } else if (strength === 3) {
      strengthBar.classList.add('medium');
      strengthText.textContent = 'Medium password';
    } else if (strength === 4) {
      strengthBar.classList.add('strong');
      strengthText.textContent = 'Strong password';
    } else {
      strengthBar.classList.add('very-strong');
      strengthText.textContent = 'Very strong password';
    }
  }

  passwordInput.addEventListener('input', (e) => {
    checkPasswordStrength(e.target.value);
  });

  // Validate form
  function validateForm() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const terms = termsCheck.checked;

    if (!email || !password) {
      showError('Please fill in all fields');
      return false;
    }

    if (!/\S+@\S+\.\S+/.test(email)) {
      showError('Please enter a valid email address');
      return false;
    }

    if (password.length < 8) {
      showError('Password must be at least 8 characters');
      return false;
    }

    if (!terms) {
      showError('You must agree to the Terms of Service');
      return false;
    }

    return true;
  }

  function showError(message) {
    errorText.textContent = message;
    errorMessage.classList.remove('hidden');
    successMessage.classList.add('hidden');
    
    setTimeout(() => {
      errorMessage.classList.add('hidden');
    }, 5000);
  }

  function showSuccess() {
    successMessage.classList.remove('hidden');
    errorMessage.classList.add('hidden');
  }

  // Signup handler
  signupBtn.addEventListener('click', async () => {
    if (!validateForm()) return;

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Disable button and show loading
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      
      // Send verification email
      await sendEmailVerification(userCredential.user);
      
      showSuccess();
      
      // Redirect after 2 seconds
      setTimeout(() => {
        window.location.href = 'login.html?verified=false';
      }, 2000);
      
    } catch (err) {
      console.error('Signup error:', err);
      
      // Handle specific error messages
      let message = 'An error occurred. Please try again.';
      if (err.code === 'auth/email-already-in-use') {
        message = 'This email is already registered. Please login instead.';
      } else if (err.code === 'auth/weak-password') {
        message = 'Password is too weak. Please choose a stronger password.';
      } else if (err.code === 'auth/invalid-email') {
        message = 'Please enter a valid email address.';
      }
      
      showError(message);
      
      // Re-enable button
      signupBtn.disabled = false;
      signupBtn.innerHTML = '<span>Create Account</span><i class="bx bx-right-arrow-alt"></i>';
    }
  });

  // Enter key support
  passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') signupBtn.click();
  });

  emailInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') passwordInput.focus();
  });
</script>

</body>
</html>

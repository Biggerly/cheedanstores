<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Cheedan Stores</title>
<!-- Firebase v10 -->
<script type="module">
  // Import functions from Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBvoWHr8Ctnzogdu756BpmSjWtmA9l-rlE",
    authDomain: "cheedan.firebaseapp.com",
    projectId: "cheedan",
    storageBucket: "cheedan.firebasestorage.app",
    messagingSenderId: "445764602981",
    appId: "1:445764602981:web:5e4b5bfbb507882fd28a8c",
    measurementId: "G-R2NCH9TRTP"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Wait until DOM is loaded
  window.addEventListener("DOMContentLoaded", () => {
    const signupBtn = document.getElementById("signupBtn");
    const errorDiv = document.getElementById("error");

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      errorDiv.textContent = "";

      if (!email || !password) {
        errorDiv.textContent = "Please fill in all fields";
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Signup successful!");
        window.location.href = "login.html";
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    });
  });
</script>
<style>
body{font-family:system-ui,sans-serif;background:#f8fafc;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{background:#fff;padding:28px 32px;border-radius:16px;box-shadow:0 8px 18px rgba(0,0,0,0.1);width:100%;max-width:400px}
h2{text-align:center;color:#022c22;margin-bottom:20px}
input{width:100%;padding:12px 14px;margin-bottom:14px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;outline:none}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#16a34a;color:#fff;font-weight:600;font-size:16px;cursor:pointer}
button:hover{background:#15803d}
p{text-align:center;margin-top:12px;font-size:14px}
a{color:#16a34a;text-decoration:none}
#error{color:red;font-size:13px;margin-bottom:10px;text-align:center}

body{
  background:
    linear-gradient(0deg, rgba(0,0,0,0.015), rgba(0,0,0,0.015)),
    #faf9f6;
}
</style>
</head>
<body>

<div class="container">
  <h2>Create Account</h2>
  <div id="error"></div>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="signupBtn">Sign Up</button>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
